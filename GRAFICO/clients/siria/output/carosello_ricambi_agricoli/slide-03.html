<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Ricambi agricoli · Slide 3 (Layout B arancio)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 60px 70px 50px;
  background-color: var(--arancio-siria);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 60px;
  width: 220px;
  height: auto;
}

.tag-stamp {
  align-self: flex-start;
  background-color: var(--blu-siria);
  color: var(--white);
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 52px;
  line-height: 1.0;
  padding: 18px 32px;
  border-radius: var(--radius);
  transform: rotate(-2deg);
  margin-bottom: 50px;
  letter-spacing: 0.02em;
}

.title {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 112px;
  line-height: 1.0;
}

.title .bl { color: var(--blu-siria); }
.title .wh { color: var(--white); }

.body {
  margin-top: 48px;
  font-family: 'Carlito', sans-serif;
  font-size: 38px;
  line-height: 1.4;
  color: var(--white);
  max-width: 920px;
}

.arrow-deco {
  margin-top: 40px;
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--blu-siria);
  letter-spacing: 0.08em;
}

.footer-row {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 22px;
  color: var(--blu-siria);
  opacity: 0.9;
}

.arrow {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--blu-siria);
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Siria Autoricambi">

  <div class="tag-stamp">Ordine unico</div>

  <h2 class="title">
    <span class="bl">Stessa</span><br>
    <span class="wh">piattaforma.</span><br>
    <span class="bl">Stesso</span><br>
    <span class="wh">corriere.</span>
  </h2>

  <p class="body">Dici il modello del mezzo, noi lo troviamo nel catalogo. Lo aggiungi all'ordine dei ricambi auto. Nessun fornitore in più.</p>

  <div class="arrow-deco">→ → →</div>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <span class="arrow">→</span>
  </div>
</section>
</body>
</html>
