<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Presa 16A · Slide 1 (cover)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 60px 70px 50px;
  background-color: var(--blu-siria);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 40px;
  width: 220px;
  height: auto;
}

.tag-stamp {
  align-self: flex-start;
  background-color: var(--arancio-siria);
  color: var(--blu-siria);
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 52px;
  line-height: 1.0;
  padding: 16px 30px;
  border-radius: var(--radius);
  transform: rotate(-2deg);
  margin-bottom: 36px;
}

.title {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 112px;
  line-height: 1.05;
}

.title .or { color: var(--arancio-siria); }
.title .wh { color: var(--white); }

.subtitle {
  margin-top: 60px;
  font-family: 'Carlito', sans-serif;
  font-size: 42px;
  line-height: 1.3;
  max-width: 900px;
}

.subtitle-emphasis {
  margin-top: 14px;
  font-family: 'Carlito', sans-serif;
  font-size: 42px;
  line-height: 1.3;
  font-weight: 700;
  font-style: italic;
  max-width: 900px;
}

.footer-row {
  margin-top: auto;
  padding-top: 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 26px;
  color: var(--white);
  opacity: 0.85;
}

.arrow-line {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--arancio-siria);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Siria Autoricambi">

  <div class="tag-stamp">Lo sapevi?</div>

  <h1 class="title">
    <span class="or">LA PRESA</span> <span class="wh">DI CASA</span><br>
    <span class="or">NON È FATTA</span><br>
    <span class="wh">PER RICARICARE</span><br>
    <span class="or">L'AUTO.</span>
  </h1>

  <p class="subtitle">16&nbsp;ampere&nbsp;per&nbsp;ore&nbsp;alla&nbsp;massima&nbsp;potenza:</p>
  <p class="subtitle-emphasis">una&nbsp;domestica&nbsp;non&nbsp;basta&nbsp;più.</p>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <span class="arrow-line">Scorri →</span>
  </div>
</section>
</body>
</html>
