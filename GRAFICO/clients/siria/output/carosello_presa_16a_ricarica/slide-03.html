<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Presa 16A · Slide 3 (stacked 16A)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px 70px;
  background-color: var(--blu-siria);
  color: var(--white);
}

.logo {
  display: block;
  margin: 0 auto;
  width: 220px;
  height: auto;
}

.stack-wrap {
  position: relative;
  margin-top: 130px;
  text-align: center;
}

.stack-bg {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  color: var(--arancio-siria);
  font-size: 360px;
  line-height: 0.9;
  letter-spacing: -0.02em;
}

.stack-bg .unit {
  font-size: 200px;
  vertical-align: top;
  margin-left: 16px;
}

.stack-fg {
  position: absolute;
  top: 240px;
  left: 50%;
  transform: translateX(-50%) rotate(-3deg);
  background-color: var(--white);
  color: var(--blu-siria);
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 64px;
  line-height: 1.0;
  padding: 22px 36px;
  border-radius: var(--radius);
  white-space: nowrap;
}

.subline {
  margin-top: 90px;
  text-align: center;
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 92px;
  line-height: 1.02;
}

.subline .or { color: var(--arancio-siria); }

.caption {
  margin-top: 50px;
  text-align: center;
  font-family: 'Carlito', sans-serif;
  font-size: 34px;
  line-height: 1.4;
  font-style: italic;
  font-weight: 700;
  max-width: 880px;
  margin-left: auto;
  margin-right: auto;
}

.footer-row {
  position: absolute;
  bottom: 60px;
  left: 70px;
  right: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 24px;
  color: var(--white);
  opacity: 0.85;
}

.arrow-line {
  font-family: 'Carlito', sans-serif;
  font-size: 48px;
  color: var(--arancio-siria);
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Siria Autoricambi">

  <div class="stack-wrap">
    <div class="stack-bg">16<span class="unit">A</span></div>
    <div class="stack-fg">Per molte ore di fila</div>
  </div>

  <h2 class="subline">
    Alla <span class="or">massima</span><br>
    potenza.
  </h2>

  <p class="caption">
    È il punto in cui la presa di casa
    smette di essere &laquo;solo una presa&raquo;.
  </p>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <span class="arrow-line">→</span>
  </div>
</section>
</body>
</html>
