<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>IG style — Caricabatterie EV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

  :root {
    --blu-siria: #162983;
    --arancio-siria: #F09305;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--blu-siria);
    font-family: 'Carlito', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .canvas {
    width: 1500px;
    height: 785px;
    background-color: var(--blu-siria);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    color: var(--white);
  }

  /* Pattern decorativo: puntini sottili */
  .canvas::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.07) 1.4px, transparent 1.4px);
    background-size: 28px 28px;
    z-index: 0;
  }

  /* Logo top-left (solo lettering SIRIA, recolor bianco per fondo blu) */
  .logo {
    position: absolute;
    top: 60px;
    left: 80px;
    width: 240px;
    height: auto;
    z-index: 3;
  }

  /* Colonna testo a sinistra, ancorata sotto al logo */
  .text-col {
    position: absolute;
    left: 80px;
    top: 240px;
    width: 680px;
    z-index: 3;
  }

  .eyebrow {
    font-family: 'Carlito', sans-serif;
    font-weight: 700;
    font-size: 26px;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    color: var(--arancio-siria);
    margin-bottom: 18px;
  }

  .title {
    font-family: 'Anton', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    font-size: 118px;
    line-height: 0.95;
    letter-spacing: 0.005em;
  }

  .title .l1 { color: var(--arancio-siria); display: block; }
  .title .l2 { color: var(--white); display: block; }

  .caption {
    margin-top: 26px;
    font-family: 'Carlito', sans-serif;
    font-weight: 400;
    font-size: 26px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }
  .caption b { font-weight: 700; color: var(--white); }

  /* Footer bottom-left: freccia + url sulla stessa riga */
  .footer {
    position: absolute;
    left: 80px;
    bottom: 50px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 3;
  }
  .footer .arrow {
    font-family: 'Carlito', sans-serif;
    font-weight: 400;
    font-size: 40px;
    color: var(--arancio-siria);
    line-height: 1;
  }
  .footer .url {
    font-family: 'Carlito', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.06em;
    color: var(--white);
    text-transform: uppercase;
  }

  /* Stage prodotto a destra: cerchio bianco con anello arancio */
  .stage {
    position: absolute;
    right: 90px;
    top: 50%;
    transform: translateY(-50%);
    width: 590px;
    height: 590px;
    border-radius: 50%;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 10px var(--arancio-siria);
    z-index: 2;
  }

  .stage img {
    width: 495px;
    height: 495px;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="../../brand/assets/logo-lettering-white.svg" alt="Siria" />

    <div class="text-col">
      <div class="eyebrow">Accessori auto elettriche</div>
      <div class="title">
        <span class="l1">A catalogo</span>
        <span class="l2">da sempre.</span>
      </div>
      <div class="caption">Cavo di ricarica <b>Tipo 2</b>.<br/>Disponibile in pronta consegna.</div>
    </div>

    <div class="footer">
      <span class="arrow">→</span>
      <span class="url">siriapd.it</span>
    </div>

    <div class="stage">
      <img src="./caricabatterie.png" alt="Caricabatterie EV" />
    </div>
  </div>
</body>
</html>
