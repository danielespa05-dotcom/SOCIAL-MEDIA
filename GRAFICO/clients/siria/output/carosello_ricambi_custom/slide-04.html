<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Ricambi custom · Slide 4 (Layout E chiusura)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 60px 70px 40px;
  background-color: var(--white);
  color: var(--text-dark);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 70px;
  width: 220px;
  height: auto;
}

.title-block {
  text-align: center;
}

.title-line {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 88px;
  line-height: 1.0;
  margin-bottom: 14px;
}

.title-line.t1 { color: var(--blu-siria); }
.title-line.t2 { color: var(--arancio-siria); }
.title-line.t3 { color: var(--blu-siria); }
.title-line.t4 { color: var(--arancio-siria); }
.title-line.t5 { color: var(--blu-siria); }

.site {
  margin-top: 36px;
  text-align: center;
  font-family: 'Carlito', sans-serif;
  font-weight: 700;
  font-size: 34px;
  letter-spacing: 0.04em;
  color: var(--blu-siria);
}

.badge-row {
  margin-top: auto;
  text-align: center;
}

.badge-30 {
  width: 220px;
  height: auto;
  display: block;
  margin: 0 auto 14px;
}

.caption {
  font-family: 'Carlito', sans-serif;
  font-style: italic;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo.png" alt="Siria Autoricambi">

  <div class="title-block">
    <div class="title-line t1">SE IL TUO CLIENTE</div>
    <div class="title-line t2">CERCA QUALCOSA</div>
    <div class="title-line t3">DI SPECIFICO,</div>
    <div class="title-line t4">SAI DOVE</div>
    <div class="title-line t5">TROVARCI.</div>
    <div class="site">siriapd.it</div>
  </div>

  <div class="badge-row">
    <img class="badge-30" src="../../brand/assets/marchio_30anni_badge.svg" alt="30 anni Siria">
    <div class="caption">Da 30 anni facciamo strada insieme.</div>
  </div>
</section>
</body>
</html>
