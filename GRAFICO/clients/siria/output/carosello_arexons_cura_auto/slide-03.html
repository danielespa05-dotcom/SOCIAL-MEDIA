<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Arexons cura auto · Slide 3 (Layout A numerone 5 categorie)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 60px 70px 50px;
  background-color: var(--arancio-siria);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 40px;
  width: 220px;
  height: auto;
}

.head-row {
  display: flex;
  align-items: center;
  gap: 36px;
  margin-bottom: 36px;
}

.numerone {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  color: var(--blu-siria);
  font-size: 360px;
  line-height: 0.85;
  letter-spacing: -0.02em;
}

.cat-label {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  color: var(--white);
  font-size: 96px;
  line-height: 0.95;
  letter-spacing: 0.01em;
}

.list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 30px;
}

.list li {
  display: flex;
  align-items: baseline;
  gap: 22px;
  font-family: 'Carlito', sans-serif;
  font-weight: 700;
  font-size: 38px;
  line-height: 1.2;
  color: var(--white);
}

.list .arrow {
  font-family: 'Carlito', sans-serif;
  font-weight: 700;
  font-size: 36px;
  color: var(--blu-siria);
  flex: 0 0 auto;
}

.subline {
  margin-top: auto;
  font-family: 'Carlito', sans-serif;
  font-size: 32px;
  line-height: 1.35;
  color: var(--white);
  font-weight: 700;
  font-style: italic;
  max-width: 880px;
}

.footer-row {
  margin-top: 26px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 24px;
  color: var(--white);
  opacity: 0.9;
}

.arrow-line {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--blu-siria);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Siria Autoricambi">

  <div class="head-row">
    <div class="numerone">5</div>
    <div class="cat-label">Categorie<br>a catalogo</div>
  </div>

  <ul class="list">
    <li><span class="arrow">→</span>Carrozzeria</li>
    <li><span class="arrow">→</span>Abitacolo</li>
    <li><span class="arrow">→</span>Plastiche e gomme</li>
    <li><span class="arrow">→</span>Trattamenti motore</li>
    <li><span class="arrow">→</span>Kit fai da te</li>
  </ul>

  <p class="subline">Una gamma intera, in un ordine solo.</p>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <span class="arrow-line">→</span>
  </div>
</section>
</body>
</html>
