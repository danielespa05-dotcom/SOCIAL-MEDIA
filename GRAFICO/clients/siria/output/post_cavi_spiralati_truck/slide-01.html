<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Cavi Spiralati Truck Leonion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  padding: 58px 72px 52px;
  background-color: var(--arancio-siria);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

/* Logo */
.logo {
  display: block;
  margin: 0 auto 48px;
  width: 210px;
  height: auto;
  filter: brightness(0) invert(1);
}

/* Eyebrow */
.eyebrow {
  font-family: 'Carlito', sans-serif;
  font-weight: 700;
  font-size: 28px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--blu-siria);
  margin-bottom: 28px;
}

/* Stack block: testo grande "dietro" + testo medio "davanti" sovrapposto */
.stack-block {
  position: relative;
  margin-bottom: 4px;
}

.s-bg {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 186px;
  line-height: 0.88;
  color: var(--white);
  display: block;
}

.s-fg {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 84px;
  line-height: 1.0;
  color: var(--blu-siria);
  position: absolute;
  left: 6px;
  top: 90px; /* sovrappone la parte bassa del testo grande */
  z-index: 2;
}

/* Secondo blocco (PRESE) più piccolo per variare il ritmo */
.stack-block--sm .s-bg  { font-size: 144px; line-height: 0.88; }
.stack-block--sm .s-fg  { font-size: 68px; top: 72px; }

/* Terzo elemento singolo */
.s-solo {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 116px;
  line-height: 0.9;
  color: var(--blu-siria);
  display: block;
  margin-top: 8px;
  margin-bottom: 40px;
}

/* Body */
.body {
  font-family: 'Carlito', sans-serif;
  font-size: 33px;
  line-height: 1.45;
  color: var(--blu-siria);
  max-width: 940px;
  margin-bottom: 36px;
}

.body strong { font-weight: 700; color: var(--white); }

/* Freccia */
.arrow-deco {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--white);
  letter-spacing: 0.08em;
}

/* Footer */
.footer-row {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 22px;
  color: var(--blu-siria);
}

.badge-30 {
  width: 84px;
  height: auto;
  filter: brightness(0) invert(1);
}
</style>
</head>
<body>
<section class="slide">

  <img class="logo" src="../../brand/assets/logo.png" alt="Siria Autoricambi">

  <div class="eyebrow">Accessori mezzi pesanti</div>

  <!-- Stack 1: CAVI / SPIRALATI -->
  <div class="stack-block">
    <span class="s-bg">CAVI</span>
    <span class="s-fg">SPIRALATI</span>
  </div>

  <!-- Stack 2: PRESE / E SPINE -->
  <div class="stack-block stack-block--sm" style="margin-top: 40px;">
    <span class="s-bg">PRESE</span>
    <span class="s-fg">E SPINE</span>
  </div>

  <!-- Solo: BATTERIA -->
  <span class="s-solo" style="margin-top: 36px;">BATTERIA</span>

  <p class="body">
    Tutto a marchio <strong>Leonion</strong>.
    Cavi 7 poli 24V in poliuretano, <strong>ISO 1185</strong> e <strong>ISO 3731</strong>.
    Prese Tipo N e Tipo S. Cavi batteria per mezzi pesanti.
  </p>

  <div class="arrow-deco">→ → →</div>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <img class="badge-30" src="../../brand/assets/marchio_30anni_badge.svg" alt="30 anni Siria">
  </div>

</section>
</body>
</html>
