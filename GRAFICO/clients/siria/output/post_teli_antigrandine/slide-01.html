<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Teli Antigrandine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --paper: #FAFAF7;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  padding: 60px 70px 50px;
  background-color: var(--paper);
  color: var(--text-dark);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 60px;
  width: 220px;
  height: auto;
}

.tag-stamp {
  align-self: flex-start;
  background-color: var(--arancio-siria);
  color: var(--blu-siria);
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 52px;
  line-height: 1.0;
  padding: 18px 34px;
  border-radius: var(--radius);
  transform: rotate(-2deg);
  margin-bottom: 50px;
}

.title {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  line-height: 1.0;
  margin-bottom: 50px;
}

.title .bl { display: block; font-size: 160px; color: var(--blu-siria); }
.title .or { display: block; font-size: 108px; color: var(--arancio-siria); }

.body {
  font-family: 'Carlito', sans-serif;
  font-size: 36px;
  line-height: 1.45;
  color: var(--text-dark);
  max-width: 920px;
  margin-bottom: 44px;
}

.body strong { font-weight: 700; color: var(--blu-siria); }

.divider-specs {
  display: flex;
  gap: 0;
  margin-bottom: 44px;
}

.spec {
  flex: 1;
  border-left: 4px solid var(--arancio-siria);
  padding-left: 20px;
}

.spec-num {
  font-family: 'Anton', sans-serif;
  font-size: 58px;
  line-height: 1.0;
  color: var(--blu-siria);
}

.spec-label {
  font-family: 'Carlito', sans-serif;
  font-size: 26px;
  line-height: 1.3;
  color: var(--text-muted);
  margin-top: 6px;
}

.arrow-deco {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--arancio-siria);
  letter-spacing: 0.08em;
}

.footer-row {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 22px;
  color: var(--text-muted);
}

.badge-30 {
  width: 88px;
  height: auto;
}
</style>
</head>
<body>
<section class="slide">

  <img class="logo" src="../../brand/assets/logo.png" alt="Siria Autoricambi">

  <div class="tag-stamp">Accessori auto e SUV</div>

  <div class="title">
    <span class="bl">TELI</span>
    <span class="or">ANTIGRANDINE</span>
  </div>

  <p class="body">
    Protezione certificata <strong>fino a 70 km/h</strong> d'impatto.<br>
    Neoprene <strong>4 mm</strong> idrorepellente. Copre cofano,<br>
    tetto, vetri laterali e posteriore.
  </p>

  <div class="divider-specs">
    <div class="spec">
      <div class="spec-num">70 km/h</div>
      <div class="spec-label">impatto resistito</div>
    </div>
    <div class="spec">
      <div class="spec-num">4 mm</div>
      <div class="spec-label">neoprene</div>
    </div>
    <div class="spec">
      <div class="spec-num">S/M/L/XL</div>
      <div class="spec-label">4 taglie</div>
    </div>
  </div>

  <div class="arrow-deco">→ → →</div>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <img class="badge-30" src="../../brand/assets/marchio_30anni_badge.svg" alt="30 anni Siria">
  </div>

</section>
</body>
</html>
