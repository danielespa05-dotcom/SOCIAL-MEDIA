<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SIRIA — Presa 16A v2 · Slide 1 (cover Layout A)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');

:root {
  --blu-siria: #162983;
  --arancio-siria: #F09305;
  --white: #FFFFFF;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Carlito', sans-serif;
  -webkit-font-smoothing: antialiased;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "clig" 0, "dlig" 0, "hlig" 0;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 60px 70px 50px;
  background-color: var(--arancio-siria);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

.logo {
  display: block;
  margin: 0 auto 30px;
  width: 220px;
  height: auto;
}

.eyebrow {
  font-family: 'Carlito', sans-serif;
  font-weight: 700;
  font-size: 30px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--white);
  margin-bottom: 24px;
}

.stack-wrap {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.stack-bg {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  color: var(--blu-siria);
  font-size: 320px;
  line-height: 0.9;
  letter-spacing: -0.02em;
}

.stack-fg {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-2deg);
  background-color: var(--white);
  color: var(--blu-siria);
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 60px;
  line-height: 1.0;
  padding: 22px 36px;
  border-radius: var(--radius);
  white-space: nowrap;
  text-align: center;
}

.subline {
  margin-top: auto;
  font-family: 'Carlito', sans-serif;
  font-size: 30px;
  line-height: 1.35;
  color: var(--white);
  font-weight: 700;
  font-style: italic;
  max-width: 800px;
}

.footer-row {
  margin-top: 26px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.handle {
  font-family: 'Carlito', sans-serif;
  font-size: 24px;
  color: var(--white);
  opacity: 0.9;
}

.arrow-line {
  font-family: 'Carlito', sans-serif;
  font-size: 44px;
  color: var(--blu-siria);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<section class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Siria Autoricambi">

  <div class="eyebrow">Lo sapevi?</div>

  <div class="stack-wrap">
    <div class="stack-bg">PRESA</div>
    <div class="stack-fg">DI&nbsp;CASA</div>
    <div class="stack-bg">L'AUTO.</div>
  </div>

  <p class="subline">La presa di casa non è fatta per ricaricare l'auto.</p>

  <div class="footer-row">
    <span class="handle">siriapd.it</span>
    <span class="arrow-line">Scorri →</span>
  </div>
</section>
</body>
</html>
