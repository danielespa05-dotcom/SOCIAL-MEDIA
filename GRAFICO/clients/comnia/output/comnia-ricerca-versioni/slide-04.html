<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>V4 — Caramelle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-coral: #F5A89A;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 100px 80px 80px;
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 44px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-yellow);
  color: #1A1A1A;
  font-weight: 700;
  font-size: 22px;
  padding: 8px 18px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 80px;
  align-self: flex-start;
}

.eyebrow {
  margin-top: 56px;
  font-weight: 400;
  font-style: italic;
  font-size: 34px;
  color: rgba(255,255,255,0.55);
  line-height: 1.3;
}

.headline {
  margin-top: 28px;
  font-weight: 900;
  font-size: 94px;
  line-height: 0.98;
  letter-spacing: -0.03em;
}

.headline em {
  color: var(--red-comnia);
  font-style: normal;
}

.headline .strike {
  position: relative;
  display: inline-block;
  color: rgba(255,255,255,0.35);
}
.headline .strike::after {
  content: "";
  position: absolute;
  left: -4px;
  right: -4px;
  top: 52%;
  height: 8px;
  background: var(--red-comnia);
  transform: rotate(-2deg);
}

.list {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.list-item {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  font-weight: 700;
  font-size: 36px;
  line-height: 1.25;
}

.list-item .arr {
  color: var(--red-comnia);
  font-weight: 900;
  flex-shrink: 0;
  width: 36px;
}

.list-item.alt {
  font-style: italic;
  font-weight: 700;
}

.attribution {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 50px;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin-top: 60px;
}

.attribution .who {
  font-weight: 700;
  font-size: 24px;
  color: rgba(255,255,255,0.85);
}

.attribution .who span {
  display: block;
  font-weight: 400;
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 4px;
}

.attribution .site {
  font-weight: 400;
  font-size: 22px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="tag">Posizionamento</div>

  <p class="eyebrow">C'è chi vende AI come <span class="strike">caramelle</span>.</p>

  <h1 class="headline">
    Noi facciamo<br>
    <em>l'opposto.</em>
  </h1>

  <div class="list">
    <div class="list-item"><span class="arr">›</span><span>Studiarla prima.</span></div>
    <div class="list-item"><span class="arr">›</span><span>Limitarla quando serve.</span></div>
    <div class="list-item alt"><span class="arr">›</span><span>Dire <b>no</b> se il paziente non è pronto.</span></div>
  </div>

  <div class="attribution">
    <div class="who">Nicola<span>Founder · Comnia</span></div>
    <div class="site">comnia.it</div>
  </div>
</div>
</body>
</html>
