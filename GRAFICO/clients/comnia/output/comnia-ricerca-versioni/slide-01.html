<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>V1 — Faremo ricerca</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 90px 80px;
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 44px;
  right: 48px;
  width: 92px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-yellow);
  color: #1A1A1A;
  font-weight: 700;
  font-size: 22px;
  padding: 8px 18px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 60px;
  align-self: flex-start;
}

.intro {
  font-weight: 400;
  font-style: italic;
  font-size: 32px;
  line-height: 1.4;
  color: rgba(255,255,255,0.55);
  margin-top: 60px;
  max-width: 720px;
}

.headline {
  font-weight: 900;
  font-size: 138px;
  line-height: 0.95;
  letter-spacing: -0.035em;
  margin-top: 36px;
  text-transform: lowercase;
}

.headline em {
  color: var(--red-comnia);
  font-style: normal;
}

.divider {
  width: 80px;
  height: 6px;
  background: var(--red-comnia);
  margin-top: 56px;
}

.body {
  margin-top: 36px;
  font-weight: 400;
  font-size: 32px;
  line-height: 1.45;
  color: rgba(255,255,255,0.85);
  max-width: 820px;
}

.body b {
  font-weight: 700;
  color: var(--white);
}

.attribution {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 60px;
}

.attribution .who {
  font-weight: 700;
  font-size: 24px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.85);
}

.attribution .who span {
  display: block;
  font-weight: 400;
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 4px;
}

.attribution .site {
  font-weight: 400;
  font-size: 22px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="tag">Manifesto</div>

  <p class="intro">Mi chiedono cosa farà Comnia<br>nei prossimi cinque anni.</p>

  <h1 class="headline">faremo<br><em>ricerca.</em></h1>

  <div class="divider"></div>

  <p class="body">
    Non è la risposta che si aspettano da un'agenzia.<br>
    Ma in questo momento il nostro mestiere<br>
    <b>non è vendere strumenti. È capirli prima.</b>
  </p>

  <div class="attribution">
    <div class="who">Nicola<span>Founder · Comnia</span></div>
    <div class="site">comnia.it</div>
  </div>
</div>
</body>
</html>
