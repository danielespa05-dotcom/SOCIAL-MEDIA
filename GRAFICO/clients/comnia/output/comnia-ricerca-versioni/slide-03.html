<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>V3 — Zona di mezzo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-blue: #A8D8EA;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-warm);
  color: var(--text-dark);
  position: relative;
  overflow: hidden;
  padding: 100px 80px 80px;
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 44px;
  right: 48px;
  width: 92px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-blue);
  color: var(--text-dark);
  font-weight: 700;
  font-size: 22px;
  padding: 8px 18px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 80px;
  align-self: flex-start;
}

.eyebrow {
  margin-top: 50px;
  font-weight: 400;
  font-style: italic;
  font-size: 32px;
  color: var(--text-muted);
  line-height: 1.3;
  max-width: 720px;
}

.poles {
  margin-top: 40px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.pole {
  flex: 1;
  font-weight: 900;
  font-size: 46px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  text-align: center;
  padding: 32px 20px;
  border: 3px solid var(--text-dark);
}

.pole.left {
  background: var(--text-dark);
  color: var(--bg-warm);
}

.vs {
  font-weight: 900;
  font-size: 38px;
  color: var(--red-comnia);
  font-style: italic;
}

.headline {
  margin-top: 60px;
  font-weight: 900;
  font-size: 78px;
  line-height: 1.05;
  letter-spacing: -0.025em;
}

.headline em {
  color: var(--red-comnia);
  font-style: normal;
}

.body {
  margin-top: 36px;
  font-weight: 400;
  font-size: 30px;
  line-height: 1.45;
  color: var(--text-dark);
  max-width: 880px;
}

.body b {
  font-weight: 700;
}

.attribution {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 40px;
}

.attribution .name {
  font-weight: 700;
  font-size: 24px;
}

.attribution .role {
  font-weight: 400;
  font-size: 20px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 4px;
}

.attribution .site {
  font-weight: 400;
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <div class="tag">Punto di vista</div>

  <p class="eyebrow">Tra due narrazioni opposte<br>c'è una zona di mezzo.</p>

  <div class="poles">
    <div class="pole left">"l'AI fa<br>tutto"</div>
    <div class="vs">↔</div>
    <div class="pole">"l'AI<br>non serve"</div>
  </div>

  <h1 class="headline">
    Il nostro mestiere<br>
    è stare <em>nel mezzo.</em>
  </h1>

  <p class="body">
    Non vendere strumenti.<br>
    <b>Capirli prima — e accompagnare chi li usa.</b>
  </p>

  <div class="attribution">
    <div>
      <div class="name">Nicola</div>
      <div class="role">Comnia · 2026</div>
    </div>
    <div class="site">comnia.it</div>
  </div>
</div>
</body>
</html>
