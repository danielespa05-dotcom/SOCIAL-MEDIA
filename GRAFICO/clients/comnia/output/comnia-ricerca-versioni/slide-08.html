<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>V8 — Sistema immunitario</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-warm);
  color: var(--text-dark);
  position: relative;
  overflow: hidden;
  padding: 100px 80px 80px;
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 44px;
  right: 48px;
  width: 92px;
  height: auto;
}

.label-row {
  margin-top: 70px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.dot {
  width: 14px;
  height: 14px;
  background: var(--red-comnia);
  border-radius: 0;
}

.label {
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.headline {
  margin-top: 36px;
  font-weight: 900;
  font-size: 76px;
  line-height: 1.04;
  letter-spacing: -0.025em;
}

.headline em {
  color: var(--red-comnia);
  font-style: normal;
}

.diagram {
  margin-top: 56px;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-left: 4px solid var(--text-dark);
  padding-left: 28px;
}

.layer {
  font-weight: 700;
  font-size: 40px;
  line-height: 1.1;
  padding: 20px 0;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 18px;
}

.layer + .layer {
  border-top: 1px dashed rgba(26,26,26,0.3);
}

.layer .arr {
  color: var(--red-comnia);
  font-weight: 900;
  width: 32px;
}

.layer .word {
  font-weight: 900;
}

.layer .meta {
  font-weight: 400;
  font-size: 26px;
  color: var(--text-muted);
  font-style: italic;
}

.kicker {
  margin-top: 50px;
  background: var(--text-dark);
  color: var(--bg-warm);
  padding: 28px 32px;
  font-weight: 700;
  font-style: italic;
  font-size: 32px;
  line-height: 1.3;
  align-self: flex-start;
  max-width: 880px;
}

.kicker b {
  background: var(--pastel-coral);
  color: var(--text-dark);
  padding: 0 8px;
  font-style: normal;
}

.foot {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 40px;
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}

.foot b {
  color: var(--text-dark);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <div class="label-row">
    <div class="dot"></div>
    <div class="label">Perché un'azienda rigetta l'AI</div>
  </div>

  <h1 class="headline">
    L'organo può essere<br>
    il <em>migliore al mondo.</em>
  </h1>

  <div class="diagram">
    <div class="layer"><span class="arr">›</span><span class="word">Processi</span></div>
    <div class="layer"><span class="arr">›</span><span class="word">Persone</span></div>
    <div class="layer"><span class="arr">›</span><span class="word">Cultura</span></div>
  </div>

  <div class="kicker">
    Se il sistema immunitario aziendale<br>
    non è pronto, <b>l'azienda lo rigetta.</b>
  </div>

  <div class="foot">
    <span><b>Nicola</b> · Comnia · 2026</span>
    <span>comnia.it</span>
  </div>
</div>
</body>
</html>
