<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Slide 02</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg-warm);
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 90px 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 60px;
  left: 70px;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.slide-number::after {
  content: "";
  display: block;
  width: 60px;
  height: 6px;
  background: var(--pastel-coral);
  margin-top: 14px;
}

.lead {
  font-weight: 400;
  font-size: 44px;
  line-height: 1.3;
  max-width: 880px;
  margin-bottom: 60px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  width: 100%;
  max-width: 920px;
}

.card {
  background-color: var(--text-dark);
  color: #fff;
  padding: 36px 20px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  border-bottom: 8px solid var(--red-comnia);
}

.card .icon {
  width: 80px;
  height: 80px;
  background-color: var(--pastel-coral);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dark);
}

.card .label {
  font-weight: 900;
  font-size: 32px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.dots {
  margin-top: 56px;
  font-weight: 900;
  font-size: 64px;
  color: var(--red-comnia);
  letter-spacing: 0.2em;
  line-height: 1;
}

.emotive {
  position: absolute;
  bottom: 80px;
  right: 70px;
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.35;
}

.emotive .arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-style: normal;
  margin-left: 12px;
}
</style>
</head>
<body>

<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="COMNIA" />

  <p class="lead">
    Se il tuo lavoro è solo questo:
  </p>

  <div class="cards">
    <div class="card">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </div>
      <div class="label">Template</div>
    </div>
    <div class="card">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
      <div class="label">Report</div>
    </div>
    <div class="card">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="14"/>
          <polyline points="3 7 12 13 21 7"/>
        </svg>
      </div>
      <div class="label">Email</div>
    </div>
  </div>

  <div class="dots">···</div>

  <p class="emotive">
    Continua. <span class="arrow">▶</span>
  </p>
</div>

</body>
</html>
