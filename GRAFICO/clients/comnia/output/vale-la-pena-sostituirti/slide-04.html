<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Slide 04</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --bubble-dark: #1A1A1A;
  --white: #FFFFFF;
  --pastel-blue: #A8D8EA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg-warm);
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 90px 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 60px;
  left: 70px;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.slide-number::after {
  content: "";
  display: block;
  width: 60px;
  height: 6px;
  background: var(--pastel-blue);
  margin-top: 14px;
}

.lead {
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.3;
  color: var(--text-muted);
  margin-bottom: 36px;
}

.icon-vs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  margin-bottom: 44px;
}

.icon-pill {
  width: 120px;
  height: 120px;
  background-color: var(--text-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
}

.icon-pill.alt {
  background-color: var(--red-comnia);
}

.vs-label {
  font-weight: 900;
  font-style: italic;
  font-size: 44px;
  letter-spacing: -0.02em;
  color: var(--text-dark);
}

.bubble {
  background-color: var(--bubble-dark);
  color: var(--white);
  padding: 56px 56px;
  font-weight: 900;
  font-size: 78px;
  line-height: 1.05;
  letter-spacing: -0.03em;
  width: 100%;
  max-width: 920px;
  text-align: center;
  border-bottom: 12px solid var(--red-comnia);
}

.bubble .keyword {
  color: var(--red-comnia);
}

.emotive {
  position: absolute;
  bottom: 80px;
  right: 70px;
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.35;
}

.emotive .arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-style: normal;
  margin-left: 12px;
}
</style>
</head>
<body>

<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="COMNIA" />

  <p class="lead">La domanda seria è un'altra:</p>

  <div class="icon-vs">
    <div class="icon-pill">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
      </svg>
    </div>
    <div class="vs-label">vs</div>
    <div class="icon-pill alt">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="4" y="6" width="16" height="12"/>
        <circle cx="9" cy="12" r="1.4" fill="currentColor"/>
        <circle cx="15" cy="12" r="1.4" fill="currentColor"/>
        <path d="M12 6V3M8 3h8"/>
      </svg>
    </div>
  </div>

  <div class="bubble">
    Cosa fai <span class="keyword">tu</span><br>
    che <span class="keyword">lei</span><br>
    non può fare?
  </div>

  <p class="emotive">
    Pensaci un secondo. <span class="arrow">▶</span>
  </p>
</div>

</body>
</html>
