<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Slide 03</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg-dark);
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 90px 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 90px 90px;
  pointer-events: none;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
  z-index: 3;
}

.slide-number {
  position: absolute;
  top: 60px;
  left: 70px;
  font-weight: 700;
  font-size: 22px;
  opacity: 0.55;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 2;
}

.slide-number::after {
  content: "";
  display: block;
  width: 60px;
  height: 6px;
  background: var(--pastel-yellow);
  margin-top: 14px;
  opacity: 1;
}

.intro {
  font-weight: 400;
  font-size: 34px;
  line-height: 1.4;
  opacity: 0.85;
  margin-bottom: 56px;
  position: relative;
  z-index: 2;
}

.ai-icon {
  width: 120px;
  height: 120px;
  background-color: var(--pastel-yellow);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 48px;
  position: relative;
  z-index: 2;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 22px;
  align-items: center;
  position: relative;
  z-index: 2;
}

.list-item {
  font-weight: 900;
  font-style: italic;
  font-size: 84px;
  line-height: 1;
  letter-spacing: -0.03em;
}

.list-item .dot {
  color: var(--red-comnia);
}

.emotive {
  position: absolute;
  bottom: 80px;
  right: 70px;
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.35;
  opacity: 0.9;
  z-index: 2;
}

.emotive .arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-style: normal;
  margin-left: 12px;
}
</style>
</head>
<body>

<div class="slide">
  <div class="bg-grid"></div>
  <img class="logo" src="../../brand/assets/logo-white.png" alt="COMNIA" />

  <div class="ai-icon">
    <svg width="68" height="68" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2">
      <rect x="3" y="5" width="18" height="14"/>
      <circle cx="8.5" cy="12" r="1.6" fill="#1A1A1A"/>
      <circle cx="15.5" cy="12" r="1.6" fill="#1A1A1A"/>
      <path d="M12 5V2M9 2h6"/>
      <path d="M3 11H1M3 14H1M23 11h-2M23 14h-2"/>
    </svg>
  </div>

  <p class="intro">…l'AI lo fa già.</p>

  <div class="list">
    <div class="list-item">Meglio<span class="dot">.</span></div>
    <div class="list-item">Più veloce<span class="dot">.</span></div>
    <div class="list-item">Senza lamentarsi<span class="dot">.</span></div>
  </div>

  <p class="emotive">
    Aspetta. <span class="arrow">▶</span>
  </p>
</div>

</body>
</html>
