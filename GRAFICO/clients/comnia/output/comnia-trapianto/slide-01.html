<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Comnia — Il trapianto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: var(--bg-dark);
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  position: relative;
  overflow: hidden;
  padding: 80px 70px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Logo */
.logo {
  position: absolute;
  top: 44px;
  right: 48px;
  width: 88px;
  height: auto;
  z-index: 10;
}

/* Tag in alto a sinistra */
.tag {
  position: absolute;
  top: 50px;
  left: 70px;
  background: var(--pastel-coral);
  color: var(--text-dark);
  font-weight: 700;
  font-size: 22px;
  padding: 8px 20px;
  border-radius: 0;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Hook centrale */
.hook-wrapper {
  margin-top: 200px;
}

.hook {
  font-weight: 900;
  font-size: 108px;
  line-height: 1.02;
  letter-spacing: -0.03em;
  color: var(--white);
}

.hook .red {
  color: var(--red-comnia);
}

.hook .stamp {
  display: inline-block;
  background: var(--red-comnia);
  color: var(--white);
  padding: 4px 28px 12px;
  margin-top: 18px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

/* Accent + sub */
.accent-line {
  width: 72px;
  height: 6px;
  background: var(--pastel-coral);
  border-radius: 0;
  margin: 56px 0 36px;
}

.subtitle {
  font-weight: 400;
  font-size: 32px;
  line-height: 1.4;
  color: rgba(255,255,255,0.72);
  font-style: italic;
  max-width: 880px;
}

.subtitle b {
  color: var(--white);
  font-weight: 700;
  font-style: normal;
}

/* Footer */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.signoff {
  font-weight: 700;
  font-size: 26px;
  color: var(--white);
  line-height: 1.3;
  font-style: italic;
}

.signoff .muted {
  display: block;
  color: rgba(255,255,255,0.45);
  font-weight: 400;
  font-style: normal;
  font-size: 22px;
  letter-spacing: 0.04em;
  margin-top: 6px;
}

.attribution {
  font-weight: 400;
  font-size: 22px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
  text-align: right;
}

.attribution b {
  color: rgba(255,255,255,0.85);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="slide">

  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">
  <div class="tag">Manifesto</div>

  <div class="hook-wrapper">
    <h1 class="hook">
      L'AI<br>
      non è<br>
      un software.<br>
      È un <span class="stamp">trapianto</span>.
    </h1>

    <div class="accent-line"></div>

    <p class="subtitle">
      Se il sistema immunitario aziendale<br>
      <b>processi, persone, cultura</b><br>
      non è pronto, l'azienda lo rigetta.
    </p>
  </div>

  <div class="footer">
    <div class="signoff">
      Studiarla prima.<br>
      Limitarla quando serve.<br>
      Dire no quando serve.
    </div>
    <div class="attribution">comnia.it</div>
  </div>

</div>
</body>
</html>
