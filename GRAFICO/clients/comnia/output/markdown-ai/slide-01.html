<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Markdown AI — 01</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 60px;
  padding-bottom: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.top {
  display: flex;
  flex-direction: column;
  gap: 32px;
  padding-top: 48px;
}

.eyebrow {
  font-weight: 700;
  font-size: 26px;
  color: var(--red-comnia);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.title {
  font-weight: 900;
  font-size: 104px;
  line-height: 0.92;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}

.red { color: var(--red-comnia); }

.divider {
  width: 80px;
  height: 5px;
  background: var(--red-comnia);
  border-radius: 0;
}

.subtitle {
  font-weight: 400;
  font-size: 38px;
  line-height: 1.5;
  color: rgba(255,255,255,0.82);
}

.subtitle strong {
  color: var(--white);
  font-weight: 700;
}

.scorri {
  font-weight: 700;
  font-style: italic;
  font-size: 26px;
  color: rgba(255,255,255,0.55);
  text-align: right;
}

.scorri .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}

.image-wrapper {
  width: 100%;
  height: 680px;
  overflow: hidden;
  flex-shrink: 0;
  margin-top: auto;
}

.image-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: left top;
  display: block;
  transform: scale(1.5);
  transform-origin: 0% 12%;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="top">
    <span class="eyebrow">La verità sul Markdown</span>

    <div class="title">
      I FILE<br><span class="red">.MD</span>
    </div>

    <div class="divider"></div>

    <p class="subtitle">
      Non li ha inventati Anthropic.<br>
      E le macchine non li capiscono<br>
      <strong>come pensiamo.</strong>
    </p>

    <p class="scorri">scopri perché<span class="arrow">▶</span></p>
  </div>

  <div class="image-wrapper">
    <img src="./Screenshot 2026-04-26 alle 23.51.16.png" alt="File .md aperto in VS Code">
  </div>
</div>
</body>
</html>
