<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Markdown AI — 03</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-coral: #F5A89A;
  --text-dark: #1A1A1A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-coral);
  color: var(--text-dark);
  font-weight: 900;
  font-size: 26px;
  padding: 10px 26px;
  border-radius: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  align-self: flex-start;
}

.title {
  font-weight: 900;
  font-size: 74px;
  line-height: 1.05;
  letter-spacing: -0.02em;
}

.body-text {
  font-weight: 400;
  font-size: 38px;
  line-height: 1.45;
  color: rgba(255,255,255,0.85);
}

.body-text strong {
  color: var(--white);
  font-weight: 700;
}

.body-text .red {
  color: var(--red-comnia);
  font-weight: 700;
}

.closing {
  font-weight: 700;
  font-style: italic;
  font-size: 40px;
  line-height: 1.3;
  color: rgba(255,255,255,0.55);
  border-left: 5px solid var(--red-comnia);
  padding-left: 28px;
}

.bottom {
  position: absolute;
  bottom: 60px;
  right: 60px;
}

.arrow-text {
  font-weight: 700;
  font-style: italic;
  font-size: 26px;
  color: rgba(255,255,255,0.45);
}

.arrow-text .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="tag">GitHub</div>

  <div class="title">Chi lo ha reso famoso.</div>

  <p class="body-text">
    Per anni è rimasto roba da developer.<br><br>
    Poi è arrivato <strong>GitHub</strong> con i <span class="red">README.md</span>.<br>
    Il Markdown è diventato lo standard<br>
    per documentare progetti.
  </p>

  <div class="closing">
    "Ma era ancora roba tecnica."
  </div>

  <div class="bottom">
    <p class="arrow-text">continua<span class="arrow">▶</span></p>
  </div>
</div>
</body>
</html>
