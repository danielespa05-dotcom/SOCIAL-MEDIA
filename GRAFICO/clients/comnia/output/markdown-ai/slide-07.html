<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Markdown AI — 08</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-blue: #A8D8EA;
  --text-dark: #1A1A1A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 44px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-blue);
  color: var(--text-dark);
  font-weight: 900;
  font-size: 26px;
  padding: 10px 26px;
  border-radius: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  align-self: flex-start;
}

.hierarchy {
  font-weight: 900;
  font-size: 52px;
  line-height: 1.25;
  letter-spacing: -0.02em;
}

.hierarchy .red { color: var(--red-comnia); }

.hierarchy .chain {
  color: rgba(255,255,255,0.35);
  font-size: 42px;
  font-weight: 400;
}

.divider {
  width: 80px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 0;
}

.body-text {
  font-weight: 400;
  font-size: 38px;
  line-height: 1.45;
  color: rgba(255,255,255,0.82);
}

.body-text strong {
  color: var(--white);
  font-weight: 700;
}

.bottom {
  position: absolute;
  bottom: 60px;
  right: 60px;
}

.arrow-text {
  font-weight: 700;
  font-style: italic;
  font-size: 26px;
  color: rgba(255,255,255,0.4);
}

.arrow-text .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="tag">La gerarchia</div>

  <div class="hierarchy">
    Più sei vicino al formato<br>
    <span class="red">nativo della macchina</span><br>
    <span class="chain">→</span> meno token sprechi<br>
    <span class="chain">→</span> meno margine di errore.
  </div>

  <div class="divider"></div>

  <p class="body-text">
    Il problema? Questi strumenti richiedono<br>
    <strong>competenze tecniche</strong>.<br><br>
    Quindi usiamo il Markdown:<br>
    perché è leggibile, è umano, è <strong>accessibile</strong>.
  </p>

  <div class="bottom">
    <p class="arrow-text">continua<span class="arrow">▶</span></p>
  </div>
</div>
</body>
</html>
