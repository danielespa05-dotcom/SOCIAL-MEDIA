<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 6 — Domanda Excel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --text-muted: #888888;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 50px;
  left: 80px;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.tag {
  display: inline-block;
  font-weight: 700;
  font-size: 26px;
  background-color: var(--pastel-coral);
  color: #1A1A1A;
  padding: 10px 22px;
  margin-bottom: 56px;
  align-self: flex-start;
  letter-spacing: 0.02em;
}

.question {
  font-weight: 900;
  font-size: 82px;
  line-height: 1.05;
  letter-spacing: -0.03em;
}

.question .line {
  display: block;
  margin-bottom: 12px;
}

.question .keyword {
  color: var(--red-comnia);
}

.question .excel {
  background-color: #107C41;
  color: var(--white);
  padding: 2px 18px;
  display: inline-block;
  font-style: italic;
}

.question .q {
  font-size: 120px;
  color: var(--red-comnia);
  display: inline-block;
  margin-left: 8px;
}

.footer {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-weight: 700;
  color: var(--red-comnia);
  font-size: 40px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">
  <span class="slide-number">06 / 07</span>
  <span class="tag">Domanda seria</span>
  <h2 class="question">
    <span class="line">Stai pagando</span>
    <span class="line">un'<span class="keyword">intelligenza</span></span>
    <span class="line">per pensare</span>
    <span class="line">o per fare</span>
    <span class="line">qualcosa che sa fare</span>
    <span class="line">anche <span class="excel">Excel</span><span class="q">?</span></span>
  </h2>
  <span class="footer">▶</span>
</div>
</body>
</html>
