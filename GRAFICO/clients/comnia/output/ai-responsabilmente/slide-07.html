<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 7 — CTA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --red-cta: #B71C1C;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 70px;
  right: 80px;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.accent-line {
  width: 120px;
  height: 6px;
  background-color: var(--red-comnia);
  margin-bottom: 48px;
}

.headline {
  font-weight: 900;
  font-size: 96px;
  line-height: 1.05;
  letter-spacing: -0.03em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.headline .key {
  color: var(--red-comnia);
}

.sub {
  font-weight: 700;
  font-style: italic;
  font-size: 42px;
  line-height: 1.3;
  max-width: 720px;
  margin-bottom: 64px;
  color: var(--text-dark);
}

.cta-text {
  display: inline-block;
  background-color: var(--red-cta);
  color: #FFFFFF;
  font-weight: 700;
  font-style: italic;
  font-size: 40px;
  padding: 24px 44px;
  letter-spacing: -0.01em;
}

.footer-mark {
  position: absolute;
  bottom: 60px;
  left: 0;
  right: 0;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">
  <span class="slide-number">07 / 07</span>
  <div class="accent-line"></div>
  <h1 class="headline">Usa l'<span class="key">AI</span><br>responsabilmente.</h1>
  <p class="sub">Non perché fa figo.<br>Non perché "perché sì".<br>Perché ha senso.</p>
  <span class="cta-text">Hai un progetto? comnia.it</span>
  <span class="footer-mark">— fine —</span>
</div>
</body>
</html>
