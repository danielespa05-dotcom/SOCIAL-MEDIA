<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 1 — Cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.kicker {
  display: inline-block;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background-color: var(--pastel-yellow);
  color: var(--text-dark);
  padding: 10px 18px;
  margin-bottom: 64px;
  align-self: flex-start;
}

.dialogue {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.line {
  font-weight: 900;
  font-size: 86px;
  line-height: 1.05;
  letter-spacing: -0.025em;
}

.line--question {
  color: var(--text-muted);
  font-size: 64px;
  font-weight: 700;
  padding-left: 60px;
  position: relative;
}

.line--question::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--red-comnia);
}

.line--dead {
  font-weight: 900;
  font-size: 92px;
  color: var(--white);
}

.keyword {
  color: var(--red-comnia);
}

.footer {
  position: absolute;
  bottom: 60px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 24px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 32px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">
  <span class="kicker">AI senza cervello</span>
  <div class="dialogue">
    <p class="line">"Mettiamoci l'<span class="keyword">AI</span>."</p>
    <p class="line line--question">"Perché?"</p>
    <p class="line line--dead">"<span class="keyword">Perché sì</span>."</p>
  </div>
  <div class="footer">
    <span>un caso vero / 7 slide</span>
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
