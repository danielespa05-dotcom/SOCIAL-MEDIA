<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 4 — Prezzi token</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-blue: #A8D8EA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 50px;
  left: 80px;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.tag {
  display: inline-block;
  font-weight: 700;
  font-size: 26px;
  background-color: var(--pastel-blue);
  color: var(--text-dark);
  padding: 10px 22px;
  margin-bottom: 44px;
  align-self: flex-start;
  letter-spacing: 0.02em;
}

.hook {
  font-weight: 700;
  font-style: italic;
  font-size: 44px;
  line-height: 1.25;
  margin-bottom: 40px;
}

.body-line {
  font-weight: 400;
  font-size: 42px;
  line-height: 1.35;
  margin-bottom: 16px;
}

.body-line--bold {
  font-weight: 700;
  margin-bottom: 44px;
}

.punchline {
  font-weight: 900;
  font-size: 68px;
  line-height: 1.1;
  letter-spacing: -0.025em;
}

.punchline .red {
  color: var(--red-comnia);
}

.keyword-bold {
  font-weight: 700;
}

.footer {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-weight: 700;
  color: var(--red-comnia);
  font-size: 40px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">
  <span class="slide-number">04 / 07</span>
  <span class="tag">Ah, e il bello?</span>
  <p class="hook">I prezzi dei token li decide qualcun altro.</p>
  <p class="body-line">Domani <span class="keyword-bold">raddoppiano</span>.</p>
  <p class="body-line body-line--bold">E tu non ci puoi fare niente.</p>
  <p class="punchline">Stai affittando<br>un <span class="red">costo</span><br>che non controlli.</p>
  <span class="footer">▶</span>
</div>
</body>
</html>
