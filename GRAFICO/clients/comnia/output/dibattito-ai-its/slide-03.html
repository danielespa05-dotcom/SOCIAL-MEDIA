<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 2 — Setup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.setup-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 48px;
}

.tag-coral {
  display: inline-block;
  font-weight: 700;
  font-size: 28px;
  background-color: var(--pastel-coral);
  color: var(--text-dark);
  padding: 10px 22px;
  letter-spacing: 0.02em;
}

.heading {
  font-weight: 900;
  font-size: 56px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 40px;
}

.body-text {
  font-weight: 400;
  font-size: 38px;
  line-height: 1.4;
  margin-bottom: 32px;
}

.emotive {
  font-weight: 700;
  font-style: italic;
  font-size: 40px;
  line-height: 1.35;
  margin-bottom: 40px;
}

.footer-line {
  font-weight: 700;
  font-size: 34px;
  line-height: 1.3;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 20px;
}

.keyword {
  color: var(--red-comnia);
  font-weight: 700;
}

.keyword-bold {
  font-weight: 700;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 40px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">
  <div class="setup-header">
    <span class="tag-coral">Ieri. Aula ITS.</span>
  </div>
  <p class="body-text">
    Lezione-dibattito con ragazzi fra i <span class="keyword-bold">20 e i 25 anni</span>.
  </p>
  <p class="emotive">
    Si sono schierati. Si sono scannati. Si sono aperti.
  </p>
  <div class="footer-line">
    <span>Ho raccolto più di <span class="keyword">10 pensieri</span>,<br>qui di seguito ne metto <span class="keyword-bold">5</span>.</span>
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
