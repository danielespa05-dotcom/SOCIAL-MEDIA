<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 2 — Ringraziamento Schettini</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  position: absolute;
  top: 50px;
  left: 80px;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.chip {
  display: inline-block;
  font-weight: 700;
  font-size: 24px;
  background-color: var(--pastel-yellow);
  color: var(--text-dark);
  padding: 8px 18px;
  letter-spacing: 0.02em;
  margin-bottom: 40px;
  align-self: flex-start;
}

.ringrazio {
  font-weight: 400;
  font-size: 36px;
  line-height: 1.3;
  margin-bottom: 16px;
}

.name {
  font-weight: 900;
  font-size: 72px;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-bottom: 28px;
}

.show-title {
  font-weight: 700;
  font-style: italic;
  font-size: 38px;
  line-height: 1.25;
  color: var(--text-dark);
  margin-bottom: 48px;
}

.show-title .highlight {
  background-color: var(--pastel-yellow);
  padding: 2px 10px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
  font-style: normal;
  font-weight: 700;
}

.reason {
  font-weight: 400;
  font-size: 36px;
  line-height: 1.35;
  margin-bottom: 36px;
}

.reason .keyword-bold {
  font-weight: 700;
}

.disclaimer {
  font-weight: 700;
  font-style: italic;
  font-size: 28px;
  color: var(--text-muted);
}

.footer {
  position: absolute;
  bottom: 60px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 34px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">
  <span class="slide-number">02 / 09</span>
  <span class="chip">Credits</span>
  <p class="ringrazio">Ringrazio</p>
  <h2 class="name">Vincenzo Schettini</h2>
  <p class="show-title">di <span class="highlight">«la fisica che ci piace»</span></p>
  <p class="reason">
    per l'idea di <span class="keyword-bold">sfruttare gli studenti</span> per fare contenuti.
  </p>
  <p class="disclaimer">(si scherza, ovviamente)</p>
  <div class="footer">
    <span>Premessa doverosa</span>
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
