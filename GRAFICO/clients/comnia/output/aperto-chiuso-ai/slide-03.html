<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 3 — Chiuso ≠ sicuro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.kicker {
  display: inline-block;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background-color: var(--pastel-coral);
  color: var(--text-dark);
  padding: 10px 18px;
  margin-bottom: 36px;
  align-self: flex-start;
}

.title {
  font-weight: 900;
  font-size: 72px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin-bottom: 36px;
}

.keyword { color: var(--red-comnia); }

.body-text {
  font-weight: 400;
  font-size: 36px;
  line-height: 1.4;
  margin-bottom: 32px;
  max-width: 880px;
}

.body-text b { font-weight: 700; }

.bubble {
  background-color: var(--white);
  color: var(--text-dark);
  padding: 32px 36px;
  margin-top: 8px;
  border-left: 8px solid var(--red-comnia);
}

.bubble__quote {
  font-weight: 900;
  font-size: 42px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 14px;
}

.bubble__tail {
  font-weight: 700;
  font-style: italic;
  font-size: 28px;
  line-height: 1.35;
  color: var(--text-dark);
}

.footer {
  position: absolute;
  bottom: 50px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 32px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">
  <span class="kicker">il falso dilemma</span>
  <h1 class="title">Aprire i pesi ha un <span class="keyword">costo reale</span>.</h1>
  <p class="body-text">Chiunque può rimuovere i <b>filtri di sicurezza</b> e usarlo come vuole. È un rischio vero.</p>
  <div class="bubble">
    <div class="bubble__quote">Ma chiuso non vuol dire sicuro.</div>
    <div class="bubble__tail">Vuol dire solo che ti fidi di chi lo gestisce.</div>
  </div>
  <div class="footer">
    <span>aperto vs chiuso ≠ sicuro vs insicuro</span>
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
