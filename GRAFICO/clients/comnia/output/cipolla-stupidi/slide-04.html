<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Cipolla 04</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-blue: #A8D8EA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 110px 70px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.meta-top {
  position: absolute;
  top: 140px;
  left: 70px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  font-weight: 700;
  font-size: 22px;
  color: var(--white);
  opacity: 0.55;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.accent-line {
  width: 80px;
  height: 6px;
  background-color: var(--pastel-blue);
  margin-top: 28px;
}

.intro {
  font-weight: 400;
  font-size: 44px;
  line-height: 1.3;
  max-width: 900px;
}

.intro .bold {
  font-weight: 700;
}

.rule {
  font-weight: 900;
  font-size: 104px;
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin-top: 40px;
  text-transform: uppercase;
}

.rule .keyword {
  color: var(--red-comnia);
}

.rule-underline {
  display: inline-block;
  border-bottom: 10px solid var(--red-comnia);
  padding-bottom: 4px;
}

.kicker {
  font-weight: 400;
  font-size: 40px;
  line-height: 1.35;
  margin-top: 56px;
  max-width: 900px;
}

.kicker .bold {
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.01em;
}

.kicker .red {
  color: var(--red-comnia);
  font-weight: 900;
  text-transform: uppercase;
}

.emotive {
  position: absolute;
  bottom: 80px;
  right: 70px;
  font-weight: 700;
  font-style: italic;
  font-size: 38px;
  text-align: right;
}

.emotive .arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-style: normal;
  margin-left: 12px;
}
</style>
</head>
<body>

<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="COMNIA" />

  <div class="meta-top">
    <div class="slide-number">04 / 06</div>
    <div class="accent-line"></div>
  </div>

  <div>
    <p class="intro">Da noi la regola è <span class="bold">una</span>:</p>

    <h2 class="rule">
      Se tua nonna<br>
      non lo capisce,<br>
      <span class="keyword">rifallo.</span>
    </h2>

    <p class="kicker">
      Non è una <span class="bold">battuta</span>.<br>
      È il <span class="red">brief</span>.
    </p>
  </div>

  <p class="emotive">
    Punto. <span class="arrow">▶</span>
  </p>
</div>

</body>
</html>
