<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Cipolla 01</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  background-color: var(--bg-warm);
  color: var(--text-dark);
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
  z-index: 3;
}

.text-block {
  flex: 0 0 30%;
  padding: 80px 70px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}

.tag {
  display: inline-block;
  width: fit-content;
  font-weight: 700;
  font-size: 22px;
  padding: 8px 18px;
  color: var(--text-dark);
  background-color: var(--pastel-yellow);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.quote {
  font-weight: 900;
  font-size: 50px;
  line-height: 1.12;
  letter-spacing: -0.02em;
  max-width: 920px;
}

.quote .keyword {
  color: var(--red-comnia);
}

.attribution {
  font-weight: 400;
  font-style: italic;
  font-size: 22px;
  margin-top: 16px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.video-block {
  flex: 1 1 70%;
  position: relative;
  background-color: var(--text-dark);
  overflow: hidden;
}

.video-block video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.meta {
  position: absolute;
  bottom: 36px;
  left: 70px;
  font-weight: 700;
  font-size: 20px;
  color: #FFFFFF;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  z-index: 3;
}

.arrow-cta {
  position: absolute;
  bottom: 30px;
  right: 70px;
  font-weight: 900;
  font-size: 28px;
  color: var(--red-comnia);
  z-index: 3;
}
</style>
</head>
<body>

<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="COMNIA" />

  <div class="text-block">
    <span class="tag">Legge · 1976</span>
    <p class="quote">
      «Sottovalutiamo sempre<br>
      il numero di <span class="keyword">stupidi</span><br>
      in circolazione.»
    </p>
    <p class="attribution">— prof. Carlo Cipolla</p>
  </div>

  <div class="video-block">
    <video src="./video-cover.mov" autoplay loop muted playsinline></video>
    <div class="meta above-video">01 / 06</div>
    <div class="arrow-cta above-video">▶</div>
  </div>
</div>

</body>
</html>
