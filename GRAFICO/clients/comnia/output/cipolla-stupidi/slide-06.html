<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>COMNIA — Cipolla 06</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: #222;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 110px 70px 90px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-dark);
  color: var(--white);
}

.meta-top {
  position: absolute;
  top: 140px;
  left: 70px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.slide-number {
  font-weight: 700;
  font-size: 22px;
  color: var(--white);
  opacity: 0.55;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.accent-line {
  width: 80px;
  height: 6px;
  background-color: var(--pastel-yellow);
  margin-top: 28px;
}

.premise {
  font-weight: 400;
  font-size: 46px;
  line-height: 1.3;
  max-width: 920px;
}

.premise .bold {
  font-weight: 700;
}

.big-question {
  font-weight: 900;
  font-size: 96px;
  line-height: 1.0;
  letter-spacing: -0.03em;
  margin-top: 48px;
  text-transform: uppercase;
  max-width: 960px;
}

.big-question .keyword {
  color: var(--red-comnia);
}

.big-question .qmark {
  color: var(--red-comnia);
  font-size: 130px;
  line-height: 0.8;
  display: inline-block;
  margin-left: 4px;
}

.signature-bottom {
  position: absolute;
  bottom: 90px;
  left: 70px;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="COMNIA" />

  <div class="meta-top">
    <div class="slide-number">06 / 06</div>
    <div class="accent-line"></div>
  </div>

  <div>
    <p class="premise">
      Se i tuoi utenti<br>
      non capiscono il tuo <span class="bold">prodotto</span>,
    </p>

    <h2 class="big-question">
      sei sicuro<br>
      che <span class="keyword">quello stupido</span><br>
      sia l'utente<span class="qmark">?</span>
    </h2>
  </div>

  <div class="signature-bottom">comnia.it · Padova</div>
</div>

</body>
</html>
