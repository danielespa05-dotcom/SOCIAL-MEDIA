<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 4 — Come ho fatto il carosello</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --pastel-yellow: #F5E642;
  --pastel-coral: #F5A89A;
  --pastel-blue: #A8D8EA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  background-color: var(--bg-dark);
  color: var(--white);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.kicker {
  display: inline-block;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white);
  border: 2px solid var(--white);
  padding: 10px 18px;
  margin-bottom: 56px;
  align-self: flex-start;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 26px;
  margin-bottom: 80px;
}

.item {
  font-weight: 900;
  font-size: 88px;
  line-height: 1;
  letter-spacing: -0.02em;
}

.item .tag {
  display: inline-block;
  padding: 10px 28px 14px;
  color: var(--text-dark);
}

.tag--yellow { background-color: var(--pastel-yellow); }
.tag--coral { background-color: var(--pastel-coral); }
.tag--blue { background-color: var(--pastel-blue); }

.punchline {
  font-weight: 900;
  font-size: 64px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 24px;
}

.keyword { color: var(--red-comnia); }

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 52px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <span class="kicker">Come l'ho fatto</span>

  <div class="list">
    <div class="item"><span class="tag tag--yellow">Testo.</span></div>
    <div class="item"><span class="tag tag--coral">Slide.</span></div>
    <div class="item"><span class="tag tag--blue">Grafica.</span></div>
  </div>

  <div class="punchline">
    Tutto da <span class="keyword">Chat</span>.
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
