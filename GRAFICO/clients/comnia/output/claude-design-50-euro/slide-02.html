<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 2 — Il tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  background-color: var(--bg-warm);
  color: var(--text-dark);
  display: flex;
  flex-direction: column;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.text-block {
  margin-top: 40px;
}

.kicker {
  display: inline-block;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background-color: var(--pastel-coral);
  color: var(--text-dark);
  padding: 8px 14px;
  margin-bottom: 28px;
}

.lead {
  font-weight: 900;
  font-size: 64px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}

.body {
  font-weight: 400;
  font-size: 30px;
  line-height: 1.4;
  margin-bottom: 12px;
}

.keyword {
  color: var(--red-comnia);
  font-weight: 700;
}

.keyword-bold { font-weight: 700; }

.emotive {
  font-weight: 700;
  font-style: italic;
}

.screen-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 40px;
  margin-top: 32px;
}

.screen-frame {
  width: 820px;
  height: 690px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.14);
}

.screen-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

.footer {
  position: absolute;
  bottom: 60px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 42px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <div class="text-block">
    <span class="kicker">il tool</span>
    <h1 class="lead">L'altro giorno è uscito <span class="keyword">Claude Design</span>.</h1>
    <p class="body">L'ennesimo rilascio di Anthropic.</p>
    <p class="body">A questo ritmo, <span class="emotive">ogni due settimane ti ribaltano il modo di lavorare</span>.</p>
  </div>

  <div class="screen-wrap">
    <div class="screen-frame">
      <img class="screen-img" src="./screen-claude-design.png" alt="Claude Design interface">
    </div>
  </div>

  <div class="footer">
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
