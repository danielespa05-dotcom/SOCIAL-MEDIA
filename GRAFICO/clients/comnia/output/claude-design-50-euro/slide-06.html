<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 6 — Chiusura</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --red-cta: #B71C1C;
  --white: #FFFFFF;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  background-color: var(--bg-dark);
  color: var(--white);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.logo {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: auto;
}

.hero {
  font-weight: 900;
  font-size: 80px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin-bottom: 40px;
}

.keyword { color: var(--red-comnia); }

.closing {
  font-weight: 900;
  font-style: italic;
  font-size: 110px;
  line-height: 1;
  letter-spacing: -0.03em;
  background-color: var(--pastel-yellow);
  color: #1A1A1A;
  padding: 16px 40px 24px;
  display: inline-block;
  margin-bottom: 56px;
}

.subclose {
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.3;
  color: var(--white);
  margin-bottom: 80px;
  max-width: 760px;
}

.signoff {
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.signoff .brand {
  color: var(--white);
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <h1 class="hero">
    L'impaginazione<br>
    la faccio io.
  </h1>

  <div class="closing">In pigiama.</div>

  <p class="subclose">Il resto continua a <span class="keyword">passare da te</span>.</p>

  <div class="signoff"><span class="brand">comnia</span> · digital agency</div>
</div>
</body>
</html>
