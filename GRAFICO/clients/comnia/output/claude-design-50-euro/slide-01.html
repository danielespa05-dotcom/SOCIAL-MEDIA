<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Slide 1 — Cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: var(--bg-warm);
  color: var(--text-dark);
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.kicker {
  display: inline-block;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background-color: var(--pastel-yellow);
  color: var(--text-dark);
  padding: 10px 18px;
  margin-bottom: 48px;
  align-self: flex-start;
}

.setup {
  font-weight: 400;
  font-size: 34px;
  line-height: 1.3;
  margin-bottom: 36px;
  color: var(--text-dark);
}

.quote {
  font-weight: 900;
  font-size: 66px;
  line-height: 1.12;
  letter-spacing: -0.02em;
  margin-bottom: 60px;
}

.quote .line { display: block; }

.keyword { color: var(--red-comnia); }

.punchline {
  font-weight: 900;
  font-style: italic;
  font-size: 76px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 28px;
}

.arrow {
  color: var(--red-comnia);
  font-weight: 900;
  font-size: 56px;
  font-style: normal;
}

.footer {
  position: absolute;
  bottom: 60px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 22px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <span class="kicker">Storia vera</span>

  <div class="setup">Ho detto al mio grafico:</div>

  <div class="quote">
    <span class="line">«Se mi dai <span class="keyword">50€</span></span>
    <span class="line">ti spiego come ho fatto</span>
    <span class="line">questo carosello</span>
    <span class="line">in <span class="keyword">10 minuti</span>.»</span>
  </div>

  <div class="punchline">Ha rifiutato.</div>

  <div class="footer">
    <span>Claude Design / diario</span>
    <span class="arrow">▶</span>
  </div>
</div>
</body>
</html>
