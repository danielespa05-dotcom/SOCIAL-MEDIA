<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Post — Neurodivergenza compatibile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --red-cta: #B71C1C;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --pastel-coral: #F5A89A;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: var(--bg-dark);
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  position: relative;
  overflow: hidden;
}

/* ── Hero image ── */
.hero {
  position: absolute;
  top: 0;
  left: 0;
  width: 1080px;
  height: 620px;
  overflow: hidden;
}

.hero img {
  width: 1080px;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.hero-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 320px;
  background: linear-gradient(to bottom, transparent 0%, rgba(10,10,10,0.7) 50%, #0A0A0A 100%);
}

/* ── Logo ── */
.logo {
  position: absolute;
  top: 40px;
  right: 48px;
  width: 88px;
  height: auto;
  z-index: 10;
}

/* ── Tag "Dal blog" ── */
.tag {
  position: absolute;
  top: 44px;
  left: 60px;
  background: var(--pastel-coral);
  color: var(--text-dark);
  font-weight: 700;
  font-size: 22px;
  padding: 8px 20px;
  border-radius: 0;
  z-index: 10;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

/* ── Content ── */
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 60px 80px;
}

.hook {
  font-weight: 900;
  font-size: 82px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  color: var(--white);
  margin-bottom: 36px;
}

.hook em {
  color: var(--red-comnia);
  font-style: normal;
}

.accent-line {
  width: 72px;
  height: 6px;
  background: var(--pastel-coral);
  border-radius: 0;
  margin-bottom: 32px;
}

.subtitle {
  font-weight: 400;
  font-size: 30px;
  line-height: 1.4;
  color: rgba(255,255,255,0.55);
  margin-bottom: 48px;
  font-style: italic;
}

.attribution {
  font-weight: 400;
  font-size: 22px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.04em;
}

.attribution span {
  color: rgba(255,255,255,0.55);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="slide">

  <!-- Hero image con gradient -->
  <div class="hero">
    <img src="./neuroai.png" alt="Neurodivergenza compatibile">
    <div class="hero-gradient"></div>
  </div>

  <!-- Logo -->
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <!-- Tag -->
  <div class="tag">Dal blog</div>

  <!-- Testo -->
  <div class="content">
    <h1 class="hook">
      L'AI non capirà <em>mai</em><br>
      le menti<br>
      neurodivergenti.
    </h1>
    <div class="accent-line"></div>
    <p class="subtitle">Quando l'incomprensibile<br>diventa infrastruttura</p>
    <p class="attribution"><span>Nicola</span> · comnia.it</p>
  </div>

</div>
</body>
</html>
