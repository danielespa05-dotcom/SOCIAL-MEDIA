<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');
:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-yellow: #F5E642;
  --text-dark: #1A1A1A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',sans-serif; -webkit-font-smoothing:antialiased; background:var(--bg-dark); }
.slide {
  width:1080px; height:1350px;
  background:var(--bg-dark); color:var(--white);
  position:relative; overflow:hidden;
  padding:60px;
  display:flex; flex-direction:column;
}
.logo {
  position:absolute;
  top:48px; right:60px;
  width:88px; height:auto;
}
.tag {
  display:inline-block;
  background:var(--pastel-yellow);
  color:var(--text-dark);
  font-weight:700;
  font-size:24px;
  padding:10px 24px;
  border-radius:0;
  letter-spacing:0.12em;
  text-transform:uppercase;
  align-self:flex-start;
  margin-top:40px;
  margin-bottom:36px;
}
.hook {
  font-weight:900;
  font-size:108px;
  line-height:0.98;
  letter-spacing:-0.03em;
  color:var(--white);
  text-transform:uppercase;
  margin-bottom:40px;
}
.hook em { color:var(--red-comnia); font-style:normal; }
.sub {
  font-weight:400;
  font-size:34px;
  line-height:1.35;
  color:rgba(255,255,255,0.75);
  margin-bottom:32px;
}
.arrow { color:var(--red-comnia); font-weight:900; margin-left:6px; }
.illustration {
  margin-top:auto;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:flex-end;
}
.illustration img {
  max-width:100%;
  height:auto;
  display:block;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="tag">Side project</div>

  <h1 class="hook">Ti fa<br>scoprire<br>chi sei<br><em>davvero.</em></h1>

  <p class="sub">Il lavoro ti paga le bollette.<br>Il tuo side project fa molto di più. <span class="arrow">▶</span></p>

  <div class="illustration">
    <!-- inserire illustrazione qui: es. <img src="./illustrazione-desk.png" alt=""> -->
  </div>
</div>
</body>
</html>
