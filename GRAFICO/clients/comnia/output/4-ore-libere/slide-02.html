<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>4 ore libere — 02</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --bubble-dark: #1A1A1A;
  --pastel-yellow: #F5E642;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-warm);
  color: var(--text-dark);
  position: relative;
  overflow: hidden;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.label {
  display: inline-block;
  background: var(--pastel-yellow);
  color: var(--text-dark);
  font-weight: 900;
  font-size: 28px;
  padding: 10px 28px;
  border-radius: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  align-self: flex-start;
}

.title {
  font-weight: 900;
  font-size: 80px;
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: var(--text-dark);
}

.body-text {
  font-weight: 400;
  font-size: 40px;
  line-height: 1.45;
  color: var(--text-dark);
}

.body-text strong {
  font-weight: 700;
}

.bubble {
  background: var(--bubble-dark);
  color: #FFFFFF;
  padding: 28px 36px;
  border-radius: 0;
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  line-height: 1.35;
}

.bottom {
  display: flex;
  justify-content: flex-end;
  position: absolute;
  bottom: 60px;
  right: 60px;
}

.arrow-text {
  font-weight: 700;
  font-style: italic;
  font-size: 28px;
  color: var(--text-dark);
}

.arrow-text .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <div class="label">A</div>

  <div class="title">Me le godo.</div>

  <p class="body-text">
    Cazzeggio e sto in chill.<br>
    Ho finito, ho consegnato.<br>
    <strong>Il tempo è mio.</strong>
  </p>

  <div class="bubble">
    "Ho fatto il mio, basta così."
  </div>

  <div class="bottom">
    <p class="arrow-text">continua<span class="arrow">▶</span></p>
  </div>
</div>
</body>
</html>
