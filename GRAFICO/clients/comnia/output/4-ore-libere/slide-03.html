<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>4 ore libere — 03</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-dark: #0A0A0A;
  --red-comnia: #C82B2B;
  --white: #FFFFFF;
  --pastel-blue: #A8D8EA;
  --text-dark: #1A1A1A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.label {
  display: inline-block;
  background: var(--pastel-blue);
  color: var(--text-dark);
  font-weight: 900;
  font-size: 28px;
  padding: 10px 28px;
  border-radius: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  align-self: flex-start;
}

.title {
  font-weight: 900;
  font-size: 80px;
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: var(--white);
}

.body-text {
  font-weight: 400;
  font-size: 40px;
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.88);
}

.body-text strong {
  font-weight: 700;
  color: var(--white);
}

.accent-line {
  width: 80px;
  height: 5px;
  background: var(--pastel-blue);
  border-radius: 0;
}

.emotive {
  font-weight: 700;
  font-style: italic;
  font-size: 36px;
  color: rgba(255, 255, 255, 0.72);
}

.bottom {
  display: flex;
  justify-content: flex-end;
  position: absolute;
  bottom: 60px;
  right: 60px;
}

.arrow-text {
  font-weight: 700;
  font-style: italic;
  font-size: 28px;
  color: rgba(255, 255, 255, 0.88);
}

.arrow-text .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-white.png" alt="Comnia">

  <div class="label">B</div>

  <div class="title">Le investo.</div>

  <p class="body-text">
    Studio, testo, automatizzo ancora.<br>
    Magari la prossima volta<br>
    ci metto <strong>2 ore invece di 4</strong>.
  </p>

  <div class="accent-line"></div>

  <p class="emotive">Il tempo guadagnato diventa carburante.</p>

  <div class="bottom">
    <p class="arrow-text">continua<span class="arrow">▶</span></p>
  </div>
</div>
</body>
</html>
