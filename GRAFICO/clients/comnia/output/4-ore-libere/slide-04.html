<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>4 ore libere — 04</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

:root {
  --bg-warm: #F0EBE5;
  --red-comnia: #C82B2B;
  --text-dark: #1A1A1A;
  --text-muted: #6B6B6B;
  --bubble-dark: #1A1A1A;
  --pastel-coral: #F5A89A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.slide {
  width: 1080px;
  height: 1350px;
  background: var(--bg-warm);
  color: var(--text-dark);
  position: relative;
  overflow: hidden;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 48px;
}

.logo {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 90px;
  height: auto;
}

.tag {
  display: inline-block;
  background: var(--pastel-coral);
  color: var(--text-dark);
  font-weight: 700;
  font-size: 22px;
  padding: 8px 24px;
  border-radius: 0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  align-self: flex-start;
}

.title {
  font-weight: 900;
  font-size: 76px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--text-dark);
}

.divider {
  width: 100%;
  height: 1px;
  background: #D0C8BE;
}

.body-text {
  font-weight: 400;
  font-size: 42px;
  line-height: 1.45;
  color: var(--text-dark);
}

.body-text em {
  font-weight: 700;
  font-style: italic;
  color: var(--text-dark);
}

.bottom {
  display: flex;
  justify-content: flex-end;
  position: absolute;
  bottom: 60px;
  right: 60px;
}

.arrow-text {
  font-weight: 700;
  font-style: italic;
  font-size: 28px;
  color: var(--text-dark);
}

.arrow-text .arrow {
  color: var(--red-comnia);
  font-style: normal;
  margin-left: 6px;
}
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../../brand/assets/logo-dark.png" alt="Comnia">

  <div class="tag">Spoiler</div>

  <div class="title">Io sono<br>della B.</div>

  <div class="divider"></div>

  <p class="body-text">
    Ma più ci penso,<br>
    più mi fermo su <em>un dubbio</em>.
  </p>

  <div class="bottom">
    <p class="arrow-text">continua<span class="arrow">▶</span></p>
  </div>
</div>
</body>
</html>
